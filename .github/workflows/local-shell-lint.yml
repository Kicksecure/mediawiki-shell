name: shell-lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Run shellcheck
        uses: org-ai-assisted/developer-meta-files/.github/actions/shellcheck@master
        with:
          ## Python helpers (mw-urlencode, mw-build-import-xml) are skipped
          ## automatically -- the action discovers scripts by shebang.
          paths: 'usr/bin usr/share/mediawiki-shell tests'
          ## SC2154: vars are set by sourced libs (common, wiki-config,
          ##   helper-scripts strings.bsh) via indirection.
          ## SC1091/SC1090: sourced files are resolved at install time
          ##   (/usr/share/..., /usr/libexec/...), not in this checkout.
          ## SC2034: vars consumed through bash namerefs / sourced libs.
          excludes: 'SC2154,SC1091,SC1090,SC2034'
          shell: 'bash'
